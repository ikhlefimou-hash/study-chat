<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>منصة التعليم - تسجيل الدخول</title>
    <style>
        body { background-color: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        .login-box { border: 1px solid #333; padding: 20px; border-radius: 8px; text-align: center; width: 300px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border-radius: 4px; border: none; }
        button { width: 95%; padding: 10px; background-color: #007bff; border: none; color: white; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h2>ikhlefimou</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة السر" required>
        <button id="login-btn">دخول</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script src="main.js"></script>
</body>
</html>
